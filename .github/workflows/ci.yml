name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          # Only lint bash scripts. zsh rc files (linked/zshrc etc.) use
          # zsh-specific syntax shellcheck can't fully parse.
          shellcheck -S warning setup linked/bin/*

  shfmt:
    name: shfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shfmt
        run: |
          go install mvdan.cc/sh/v3/cmd/shfmt@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Check formatting
        run: shfmt -d -i 2 -ci setup linked/bin/*

  doctor:
    name: doctor (docs ↔ Brewfile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run doctor
        env:
          DOTFILES_DIR: ${{ github.workspace }}
        run: ./linked/bin/doctor

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
